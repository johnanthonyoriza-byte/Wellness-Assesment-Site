<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wellness App Lobby</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #EBFFFB, #94FFF0, #3DB8FF);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.4);
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        button {
            margin-top: 25px;
            padding: 14px 35px;
            font-size: 16px;
            background: linear-gradient(#94FFF0, #3DB8FF);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-6px) scale(1.08);
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.6);
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Welcome to the Wellness Assessment</h1>
    <p>Test your overall wellness level across multiple life areas.</p>
    <p>Answer 10 questions using a 1–5 scale.</p>

    <button onclick="startTest()">Start Test</button>
</div>

<script>
function startTest() {
    window.location.href = "test.html";
}
</script>

</body>
</html>
