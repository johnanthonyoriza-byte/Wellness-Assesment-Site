<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
<title>Personal Wellness Assessment</title>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 40px;
    background: linear-gradient(-45deg, #EBFFFB, #94FFF0, #3DB8FF);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Animated overlay */
body::before{
    content:"";
    position:fixed;
    top:-100%;
    left:-100%;
    width:300%;
    height:300%;
    background: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.05) 0px,
        rgba(255,255,255,0.05) 20px,
        transparent 20px,
        transparent 40px
    );
    animation: moveStripes 12s linear infinite;
    pointer-events:none;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes moveStripes{
from{transform:translateX(0) translateY(0);}
to{transform:translateX(-200px) translateY(-200px);}
}

/* Container */
.container{
max-width:480px;
margin:auto;
backdrop-filter: blur(15px);
background: rgba(255,255,255,0.92);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#555;
margin-bottom:20px;
}

/* Question cards */
.question{
background:#f9fbfc;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
transition:all 0.2s ease;
}

.question:hover{
transform:translateY(-2px);
box-shadow:0 8px 15px rgba(0,0,0,0.1);
}

label{
font-size:14px;
font-weight:500;
display:block;
margin-bottom:6px;
}

/* Select styling */
select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
background:#fff;
transition:all 0.2s ease;
}

select:focus{
outline:none;
border-color:#3DB8FF;
box-shadow:0 0 5px rgba(61,184,255,0.5);
}

/* Buttons */
button{
width:100%;
margin-top:15px;
padding:12px;
font-size:15px;
background:linear-gradient(135deg,#47CEFF,#3DB8FF);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:all 0.3s ease;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,255,255,0.4);
}

/* Result */
.result{
margin-top:20px;
font-weight:bold;
font-size:20px;
text-align:center;
}

/* Progress bar */
.meter{
width:100%;
height:22px;
background:#eee;
border-radius:15px;
margin-top:15px;
overflow:hidden;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#3DB8FF,#47CEFF);
transition:width 1s ease;
border-radius:15px;
}

/* Advice */
.advice{
margin-top:15px;
font-size:14px;
text-align:center;
color:#333;
}

/* Retake button style */
.retake{
background:#f1f1f1;
color:#333;
}

.retake:hover{
background:#ddd;
box-shadow:none;
}

</style>
</head>

<body>

<div class="container">

<h2>💙 Personal Wellness</h2>
<p class="subtitle">Rate each statement honestly</p>

<div id="questions"></div>

<button onclick="calculateWellness()">Calculate Score</button>

<div class="result" id="result"></div>

<div class="meter">
<div id="bar"></div>
</div>

<div class="advice" id="advice"></div>

<button class="retake" onclick="location.reload()">Retake Assessment</button>

</div>

<script>

const questions = [
{ text: "I get at least 7-8 hours of quality sleep most nights.", weight: 2 },
{ text: "I engage in physical activity at least 3 times per week.", weight: 2 },
{ text: "I maintain a balanced and nutritious diet.", weight: 2 },
{ text: "I feel emotionally stable and manage stress well.", weight: 3 },
{ text: "I have supportive relationships in my life.", weight: 2 },
{ text: "I feel motivated and purposeful daily.", weight: 3 },
{ text: "I limit excessive screen time.", weight: 1 },
{ text: "I take time for self-care regularly.", weight: 2 },
{ text: "I feel confident about my life direction.", weight: 3 },
{ text: "I rarely feel overwhelmed.", weight: 2 }
];

const container = document.getElementById("questions");

questions.forEach((q,index)=>{
container.innerHTML += `
<div class="question">
<label>${index+1}. ${q.text}</label>
<select id="q${index}">
<option value="">Choose your answer</option>
<option value="1">😞 Strongly Disagree</option>
<option value="2">😕 Disagree</option>
<option value="3">😐 Neutral</option>
<option value="4">🙂 Agree</option>
<option value="5">😄 Strongly Agree</option>
</select>
</div>
`;
});

function calculateWellness(){

let weightedSum=0;
let totalWeight=0;

for(let i=0;i<questions.length;i++){

let value=parseFloat(document.getElementById("q"+i).value);

if(!value){
document.getElementById("result").innerText="⚠️ Answer all questions first.";
return;
}

weightedSum+=value*questions[i].weight;
totalWeight+=questions[i].weight;

}

let weightedMean=weightedSum/totalWeight;
let level="";
let advice="";
let color="";

if(weightedMean<1.67){
level="Extremely Low Wellness";
color="#ff4d4d";
advice="Start small: improve sleep, movement, and talk to someone you trust.";
}
else if(weightedMean<2.33){
level="Very Low Wellness";
color="#ff6b6b";
advice="You're struggling a bit—focus on daily habits first.";
}
else if(weightedMean<3.00){
level="Low Wellness";
color="#ffaa00";
advice="You're getting there. Build better routines step by step.";
}
else if(weightedMean<3.67){
level="Moderate Wellness";
color="#ffd166";
advice="You're okay, but there's room to level up your lifestyle.";
}
else if(weightedMean<4.33){
level="Good Wellness";
color="#2ecc71";
advice="Nice. Stay consistent and protect your habits.";
}
else{
level="Excellent Wellness";
color="#1abc9c";
advice="You're doing great—just keep it steady.";
}

let resultBox=document.getElementById("result");

resultBox.style.color=color;
resultBox.innerHTML=
"Score: "+weightedMean.toFixed(2)+"<br>"+level;

document.getElementById("advice").innerText=advice;

let percent=(weightedMean/5)*100;
document.getElementById("bar").style.width=percent+"%";

}

</script>

</body>
</html>
