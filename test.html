<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
    <title>Personal Wellness Assessment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #EBFFFB, #94FFF0, #3DB8FF);
			background-size: 400% 400%;
            padding: 40px;
			animation: gradientBG 10s ease infinite;
        }
		
		@keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: linear-gradient(#47CEFF, #3DB8FF);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
			transition: all 0.3s ease;
        }

        button:hover {
		    transform: translateY(-1px) scale(1.02);
			box-shadow: 0 5px 10px rgba(0, 255, 255, 0.6)
           
        }

        .result {
            margin-top: 25px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Personal Wellness Assessment</h2>
    <p>Rate each statement from 1 (Strongly Disagree) to 5 (Strongly Agree).</p>

    <div id="questions"></div>

    <button onclick="calculateWellness()">Calculate Wellness Score</button>

    <div class="result" id="result"></div>
</div>

<script>
const questions = [
    { text: "1. I get at least 7-8 hours of quality sleep most nights.", weight: 2 },
    { text: "2. I engage in physical activity at least 3 times per week.", weight: 2 },
    { text: "3. I maintain a balanced and nutritious diet.", weight: 2 },
    { text: "4. I feel emotionally stable and able to manage stress effectively.", weight: 3 },
    { text: "5. I have supportive relationships in my life.", weight: 2 },
    { text: "6. I feel motivated and purposeful in my daily activities.", weight: 3 },
    { text: "7. I limit excessive screen time and digital distractions.", weight: 1 },
    { text: "8. I take time for relaxation or self-care regularly.", weight: 2 },
    { text: "9. I feel confident about my current life direction.", weight: 3 },
    { text: "10.I rarely feel overwhelmed by responsibilities.", weight: 2 }
];

const container = document.getElementById("questions");

// Generate Questions
questions.forEach((q, index) => {
    container.innerHTML += `
        <div class="question">
            <label>${q.text}</label>
            <select id="q${index}">
                <option value="">Select</option>
                <option value="1">1 - Strongly Disagree</option>
                <option value="2">2 - Disagree</option>
                <option value="3">3 - Neutral</option>
                <option value="4">4 - Agree</option>
                <option value="5">5 - Strongly Agree</option>
            </select>
        </div>
    `;
});

function calculateWellness() {
    let weightedSum = 0;
    let totalWeight = 0;

    for (let i = 0; i < questions.length; i++) {
        let value = parseFloat(document.getElementById("q" + i).value);

        if (!value) {
            document.getElementById("result").innerText =
                "You failed to answer all  the questions, how dumb can you be? Maybe an IQ test would be more fitting for you.";
            return;
        }

        weightedSum += value * questions[i].weight;
        totalWeight += questions[i].weight;
    }

    let weightedMean = weightedSum / totalWeight;
    let level = "";

    if (weightedMean < 1.1) {
        level = "Extremely Low Wellness – 'Help is available - 0919-057-1553'";
	} else if (weightedMean < 1.5) {
	    level = "Very Low Wellness – 'You should probably get a therapist'";
	} else if (weightedMean < 2.5) {
	    level = "Low Wellness – 'Still got problems";
    } else if (weightedMean < 3.5) {
        level = "Moderate Wellness – 'Still need some improvements'";
    } else if (weightedMean < 4.5) {
        level = "Good Wellness – 'Healthy'";
    } else {
        level = "Excellent Wellness – 'Perfectly Healthy'";
    }

    document.getElementById("result").innerText =
        "Weighted Mean: " + weightedMean.toFixed(2) + " | " + level;
}
</script>

</body>
</html>
